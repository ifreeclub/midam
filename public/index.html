<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#2c3e50">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="미담사진관">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
      * {
        -webkit-user-select: none !important;
        -webkit-touch-callout: none !important; /* 공유/인쇄 팝업 방지 */
        user-select: none !important;
      }
      input, textarea {
        -webkit-user-select: text !important; /* 입력창은 허용 */
        user-select: text !important;
      }
    </style>
    <script>
      // 길게 눌렀을 때 시스템 메뉴 뜨는 것을 원천 봉쇄
      window.oncontextmenu = function() { return false; };
    </script>
  <title>미담사진관</title>
</head>

<body>

  <!-- 상단 헤더 -->
  <header class="top-header">
    <h1 class="top-header__title">미담사진관</h1>
  </header>

  <!-- 메인 레이아웃 -->
  <main class="main-layout">

    <!-- 좌측 - 실시간 접수하기 (66%) -->
    <section class="panel panel-left">
      <div class="panel-header">
        <h2 class="panel-header__title">실시간 접수하기</h2>
      </div>
      <div class="panel-body">
        <p class="notice-text">사진파일 보관용으로만 사용됩니다</p>

        <div class="form-group">
          <label class="form-label" for="input-name">이름</label>
          <input type="text" id="input-name" class="form-input" maxlength="50" autocomplete="off" inputmode="text" placeholder="이름을 입력하세요">
        </div>

        <div class="form-group">
          <label class="form-label" for="input-phone">전화번호</label>
          <input type="tel" id="input-phone" class="form-input" maxlength="20" autocomplete="off" inputmode="tel" value="010-">
        </div>

        <div class="form-group">
          <label class="form-label" for="input-email">이메일</label>
          <input type="email" id="input-email" class="form-input" maxlength="100" autocomplete="off" inputmode="email" placeholder="선택 입력">
          <p class="email-warning">
            ※파일 필요하신 분만 이메일 작성※<br>
            파일비 3000원 추가 (현금/계좌이체시 무료제공)
          </p>
        </div>

        <div class="button-row">
          <button type="button" class="btn btn-secondary" id="btn-cancel">취소</button>
          <button type="button" class="btn btn-primary" id="btn-submit">등록</button>
        </div>
      </div>
    </section>

    <!-- 우측 - 미담대기자 + 새로고침 버튼 분리 -->
    <section class="panel panel-right">
      <div class="right-header-row">
        <div class="panel-header right-main-header">
          <h2 class="panel-header__title">미담대기자</h2>
        </div>
        <div class="refresh-box">
          <button type="button" class="btn-refresh" id="btn-refresh" aria-label="새로고침">
            <svg class="btn-refresh__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M21 12a9 9 0 1 1-3-6.7L21 8" />
              <polyline points="21 3 21 8 16 8" />
            </svg>
          </button>
        </div>
      </div>
      <div class="panel-body panel-body--waitlist">
        <p class="waitlist-guide">이름 선택 후<br>핸드폰 끝자리 4자리 입력하면<br>정보 수정가능합니다</p>
        <div class="waitlist-container" id="waitlist-container">
          <div class="waitlist-loading">불러오는 중...</div>
        </div>
      </div>
    </section>

  </main>

  <!-- 인증 모달 (끝4자리 입력) -->
  <div class="modal-overlay" id="modal-auth" role="dialog" aria-modal="true" aria-labelledby="modal-auth-title" hidden>
    <div class="modal-box">
      <h3 class="modal-title" id="modal-auth-title"><span id="auth-target-name"></span>님 핸드폰 번호<br>끝 4자리를 입력해주세요</h3>
      <input type="tel" id="input-last4" class="form-input modal-input" maxlength="4" inputmode="numeric" pattern="[0-9]*" autocomplete="off">
      <p class="modal-error" id="auth-error" hidden>핸드폰 끝자리 4자리가 맞지 않습니다</p>
      <div class="button-row">
        <button type="button" class="btn btn-secondary" id="btn-auth-cancel">취소</button>
        <button type="button" class="btn btn-primary" id="btn-auth-confirm">확인</button>
      </div>
    </div>
  </div>

  <!-- 수정 모달 -->
  <div class="modal-overlay" id="modal-edit" role="dialog" aria-modal="true" aria-labelledby="modal-edit-title" hidden>
    <div class="modal-box modal-box--wide">
      <h3 class="modal-title" id="modal-edit-title">정보 수정</h3>
      <div class="form-group">
        <label class="form-label" for="edit-name">이름</label>
        <input type="text" id="edit-name" class="form-input" readonly>
      </div>
      <div class="form-group">
        <label class="form-label" for="edit-phone">전화번호</label>
        <input type="tel" id="edit-phone" class="form-input" maxlength="20" inputmode="tel">
      </div>
      <div class="form-group">
        <label class="form-label" for="edit-email">이메일</label>
        <input type="email" id="edit-email" class="form-input" maxlength="100" inputmode="email">
      </div>
      <div class="button-row">
        <button type="button" class="btn btn-secondary" id="btn-edit-cancel">취소</button>
        <button type="button" class="btn btn-primary" id="btn-edit-save">저장</button>
      </div>
    </div>
  </div>

  <!-- 커스텀 알림 토스트 (alert 대체) -->
  <div class="toast-container" id="toast-container" aria-live="polite"></div>

  <!-- 커스텀 메시지 모달 (alert 완전 대체) -->
  <div class="modal-overlay" id="modal-message" role="alertdialog" aria-modal="true" hidden>
    <div class="modal-box modal-box--narrow">
      <p class="modal-message-text" id="modal-message-text"></p>
      <div class="button-row button-row--single">
        <button type="button" class="btn btn-primary" id="btn-message-ok">확인</button>
      </div>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="app.js"></script>

</body>

</html>
